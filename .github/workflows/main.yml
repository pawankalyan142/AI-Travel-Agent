name: AI Code Review (Final)

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CHUNK_SIZE: 200
  MAX_TOTAL_LINES: 1000
  CONTEXT_LINES: 5

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout full repo on runner machine
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Check if AI already reviewed this PR
      - name: Check if AI already reviewed this PR
        id: check_reviewed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments?per_page=100",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              comments = json.loads(r.read())
          already_reviewed = any(
              "AI Code Review Complete" in c.get("body", "") or
              "AI Code Review Skipped" in c.get("body", "")
              for c in comments
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_reviewed={'true' if already_reviewed else 'false'}\n")
          print(f"Already reviewed: {already_reviewed}")
          EOF

      # Step 3: Stop if already reviewed
      - name: Post already reviewed comment and stop
        if: steps.check_reviewed.outputs.already_reviewed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": \"## ℹ️ AI Review Already Done\n\n✅ AI has already reviewed this PR once. No further AI reviews will run.\n\n**Next step:** Please fix the AI comments and request a **peer review** from your teammates.\"}"

      # Step 4: Get diff and validate size
      - name: Get PR diff and validate size
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        id: validate_diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.js' '*.ts' '*.tsx' '*.jsx' \
               '*.java' '*.go' '*.rb' '*.php' '*.cs' \
               '*.cpp' '*.c' '*.h' '*.rs' '*.swift' \
               '*.kt' '*.scala' '*.yaml' '*.yml' '*.json' \
               '*.html' '*.css' '*.scss' \
            > pr_diff.txt
          ADDED_LINES=$(grep -c '^+[^+]' pr_diff.txt || true)
          echo "Added lines in diff: $ADDED_LINES"
          echo "total_lines=$ADDED_LINES" >> $GITHUB_OUTPUT
          if [ "$ADDED_LINES" -gt "$MAX_TOTAL_LINES" ]; then
            echo "too_large=true" >> $GITHUB_OUTPUT
          else
            echo "too_large=false" >> $GITHUB_OUTPUT
          fi

      # Step 5: Hard stop if PR too large
      - name: Comment PR too large and exit
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": \"## ⚠️ AI Code Review Skipped\n\n**Reason:** This PR has **${{ steps.validate_diff.outputs.total_lines }} added lines** which exceeds the limit of 1000 lines.\n\n**Please split this PR into smaller focused PRs.**\"}"
          exit 0

      # Step 6: Parse diff — assign a numeric ID to every added line
      #          The AI will reference lines by ID, never by file path.
      #          This completely eliminates path hallucination.
      - name: Parse diff and enrich with real file context
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          CONTEXT_LINES: ${{ env.CONTEXT_LINES }}
        run: |
          python3 << 'EOF'
          import json, re, os
          context_size = int(os.environ.get("CONTEXT_LINES", 5))
          changed_lines = []
          current_file = None
          new_line = 0

          with open("pr_diff.txt", "r") as f:
              raw_lines = f.readlines()

          for line in raw_lines:
              if line.startswith("diff --git"):
                  match = re.search(r'b/(.+)', line)
                  if match:
                      current_file = match.group(1).strip()
              elif line.startswith("@@"):
                  match = re.search(r'\+(\d+)', line)
                  if match:
                      new_line = int(match.group(1)) - 1
              elif line.startswith("+") and not line.startswith("+++"):
                  new_line += 1
                  changed_lines.append({"file": current_file, "line": new_line, "content": line[1:].rstrip()})
              elif not line.startswith("-") and not line.startswith("\\"):
                  new_line += 1

          diff_data = []
          for entry in changed_lines:
              file_path = entry["file"]
              changed_line_num = entry["line"]
              context_before, context_after = [], []
              if os.path.exists(file_path):
                  with open(file_path, "r", errors="ignore") as f:
                      all_lines = f.readlines()
                  total = len(all_lines)
                  start = max(0, changed_line_num - context_size - 1)
                  context_before = [
                      f"line {start+i+1}: {all_lines[start+i].rstrip()}"
                      for i in range(changed_line_num - 1 - start)
                  ]
                  start_after = changed_line_num
                  end_after = min(total, changed_line_num + context_size)
                  context_after = [
                      f"line {start_after+i+1}: {all_lines[start_after+i].rstrip()}"
                      for i in range(end_after - start_after)
                  ]
              diff_data.append({
                  "file": file_path,
                  "line": changed_line_num,
                  "content": entry["content"],
                  "context_before": context_before,
                  "context_after": context_after
              })

          chunk_size = int(os.environ.get("CHUNK_SIZE", 200))
          chunks = [diff_data[i:i+chunk_size] for i in range(0, len(diff_data), chunk_size)]
          with open("diff_chunks.json", "w") as f:
              json.dump(chunks, f, indent=2)
          print(f"Total changed lines: {len(diff_data)}, chunks: {len(chunks)}")
          EOF

      # Step 7: Call OpenAI — AI identifies lines by numeric ID only, never by path
      - name: Call OpenAI per chunk and collect comments
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os, time

          with open("diff_chunks.json", "r") as f:
              chunks = json.load(f)

          api_key = os.environ["OPENAI_API_KEY"]
          all_comments = []
          # Global line ID registry — maps id -> {file, line}
          # Built fresh per chunk, written to disk for Step 8 to consume
          global_id_map = {}
          global_id_counter = 0

          for idx, chunk in enumerate(chunks):
              print(f"\nProcessing chunk {idx+1}/{len(chunks)} ({len(chunk)} lines)...")

              # Assign a simple numeric ID to each line in this chunk.
              # The AI only ever sees and returns these IDs — never file paths.
              chunk_id_map = {}
              diff_text = ""

              for item in chunk:
                  lid = global_id_counter
                  global_id_counter += 1
                  chunk_id_map[lid] = {"file": item["file"], "line": item["line"]}
                  global_id_map[lid] = {"file": item["file"], "line": item["line"]}

                  diff_text += f"\n--- ID:{lid} ---\n"
                  if item["context_before"]:
                      diff_text += "Context before:\n"
                      for c in item["context_before"]:
                          diff_text += f"  {c}\n"
                  diff_text += f">>> ADDED LINE (ID:{lid}): {item['content']}\n"
                  if item["context_after"]:
                      diff_text += "Context after:\n"
                      for c in item["context_after"]:
                          diff_text += f"  {c}\n"

              system_prompt = (
                  "You are a senior software engineer performing a focused, high-signal code review. "
                  "You respond ONLY with a valid JSON array. "
                  "No markdown fences, no explanation, no preamble. "
                  "If there are no issues return exactly: []"
              )

              user_prompt = (
                  "Review the newly added lines from a pull request below.\n"
                  "\n"
                  "Each block is identified by a numeric ID like ID:42.\n"
                  "Context before/after lines are for understanding only — do NOT flag them.\n"
                  "Only flag the >>> ADDED LINE if it has a genuine, objective issue.\n"
                  "\n"
                  "FLAG only for:\n"
                  "  - Security vulnerabilities (injection, exposed secrets, broken auth)\n"
                  "  - Bugs causing crashes, data loss, or wrong results\n"
                  "  - Missing error handling on I/O, network, or DB calls\n"
                  "  - Race conditions or concurrency bugs\n"
                  "  - Obvious performance issues (N+1 queries, unbounded loops)\n"
                  "  - Resource leaks (unclosed files, connections, handles)\n"
                  "  - Hardcoded secrets or magic values that must be config\n"
                  "\n"
                  "DO NOT FLAG:\n"
                  "  - Style, naming, or formatting\n"
                  "  - Architectural opinions\n"
                  "  - Issues already handled in surrounding context\n"
                  "  - Test files unless there is a definite logic bug\n"
                  "\n"
                  "OUTPUT — a JSON array. Each object must have exactly:\n"
                  '  "id"      : the integer ID number from ID:N (just the number, no prefix)\n'
                  '  "comment" : one sentence — the problem and what to fix\n'
                  "\n"
                  "Example (if lines ID:3 and ID:17 have issues):\n"
                  '[ {"id": 3, "comment": "..."}, {"id": 17, "comment": "..."} ]\n'
                  "\n"
                  "If no issues: []\n"
                  "\n"
                  "LINES TO REVIEW:\n"
                  + diff_text
              )

              payload = {
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user",   "content": user_prompt}
                  ],
                  "max_tokens": 1500,
                  "temperature": 0.1
              }

              for attempt in range(3):
                  try:
                      req = urllib.request.Request(
                          "https://api.openai.com/v1/chat/completions",
                          data=json.dumps(payload).encode(),
                          headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}
                      )
                      with urllib.request.urlopen(req) as response:
                          data = json.loads(response.read())

                      raw = data["choices"][0]["message"]["content"].strip()
                      if raw.startswith("```"):
                          raw = "\n".join(raw.split("\n")[1:])
                      if raw.endswith("```"):
                          raw = "\n".join(raw.split("\n")[:-1])
                      raw = raw.strip()

                      chunk_comments = json.loads(raw)

                      # Resolve ID -> real file + line right here, before saving
                      resolved = []
                      for c in chunk_comments:
                          lid = int(c["id"])
                          if lid in chunk_id_map:
                              resolved.append({
                                  "file":    chunk_id_map[lid]["file"],
                                  "line":    chunk_id_map[lid]["line"],
                                  "comment": c["comment"]
                              })
                          else:
                              print(f"  WARNING: AI returned unknown ID {lid}, skipping")

                      all_comments.extend(resolved)
                      print(f"Chunk {idx+1}: {len(resolved)} comments resolved")
                      break

                  except Exception as e:
                      print(f"Chunk {idx+1} attempt {attempt+1} failed: {e}")
                      if attempt < 2:
                          wait = 2 ** attempt
                          print(f"Retrying in {wait}s...")
                          time.sleep(wait)
                      else:
                          print(f"Chunk {idx+1} failed after 3 attempts, skipping")

              if idx < len(chunks) - 1:
                  time.sleep(2)

          with open("line_comments.json", "w") as f:
              json.dump(all_comments, f, indent=2)
          print(f"\nTotal comments: {len(all_comments)}")
          EOF

      # Step 8: Post inline comments — paths come from our own diff data, never from the AI
      - name: Post line-level comments on PR
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, urllib.error, os

          with open("line_comments.json", "r") as f:
              comments = json.load(f)

          token      = os.environ["GITHUB_TOKEN"]
          repo       = os.environ["REPO"]
          pr_number  = os.environ["PR_NUMBER"]
          commit_sha = os.environ["PR_COMMIT_SHA"]
          posted = failed = 0

          for item in comments:
              # file and line are already resolved from our diff data — no AI path involved
              payload = {
                  "body":      f"🤖 **AI Review:** {item['comment']}",
                  "commit_id": commit_sha,
                  "path":      item["file"],
                  "line":      item["line"],
                  "side":      "RIGHT"
              }
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/pulls/{pr_number}/comments",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github.v3+json"
                  }
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      if r.status == 201:
                          posted += 1
                          print(f"Posted on {item['file']} line {item['line']}")
              except urllib.error.HTTPError as e:
                  failed += 1
                  print(f"Failed on {item['file']} line {item['line']}: {e.read().decode()}")

          print(f"\nSummary: {posted} posted, {failed} failed")
          EOF

      # Step 9: Add ai-reviewed label
      - name: Add ai-reviewed label
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/labels" \
            -d '{"name":"ai-reviewed","color":"7057ff","description":"AI code review completed"}' || true
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
            -d '{"labels":["ai-reviewed"]}'
          echo "Label ai-reviewed applied"

      # Step 10: Post final summary comment
      - name: Post summary comment
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TOTAL_LINES: ${{ steps.validate_diff.outputs.total_lines }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request

          with open("line_comments.json") as f:
              comments = json.load(f)
          with open("diff_chunks.json") as f:
              chunks = json.load(f)

          body = (
              "## \u2705 AI Code Review Complete\n\n"
              f"- **Total added lines reviewed:** {os.environ.get('TOTAL_LINES', '?')}\n"
              f"- **Chunks processed:** {len(chunks)}\n"
              f"- **Inline comments posted:** {len(comments)}\n"
              "- **Label added:** `ai-reviewed`\n\n"
              "\u26a0\ufe0f **AI review is a one-time pass. Please fix the inline comments above, "
              "then request a peer review from your teammates. AI will not review this PR again.**"
          )

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
              data=json.dumps({"body": body}).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              print(f"Summary posted: {r.status}")
          EOF
