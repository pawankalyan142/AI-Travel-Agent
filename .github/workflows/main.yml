name: AI Code Review (Final)

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  MAX_TOTAL_LINES: 1000
  MAX_LINES_PER_FILE: 300
  CONTEXT_LINES: 10

permissions:
  pull-requests: write
  contents: write
  issues: write

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout full repo
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Check if AI already reviewed this PR
      - name: Check if AI already reviewed this PR
        id: check_reviewed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments?per_page=100",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              comments = json.loads(r.read())
          already_reviewed = any(
              "AI Code Review Complete" in c.get("body", "") or
              "AI Code Review Skipped" in c.get("body", "")
              for c in comments
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_reviewed={'true' if already_reviewed else 'false'}\n")
          print(f"Already reviewed: {already_reviewed}")
          EOF

      # Step 3: Stop if already reviewed — apply label
      - name: Post already reviewed comment and stop
        if: steps.check_reviewed.outputs.already_reviewed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": \"## ℹ️ AI Review Already Done\n\n✅ AI has already reviewed this PR once. No further AI reviews will run.\n\n**Next step:** Please fix the AI comments and request a **peer review** from your teammates.\"}"

      # Step 4: Get diff and validate size
      - name: Get PR diff and validate size
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        id: validate_diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.js' '*.ts' '*.tsx' '*.jsx' \
               '*.java' '*.go' '*.rb' '*.php' '*.cs' \
               '*.cpp' '*.c' '*.h' '*.rs' '*.swift' \
               '*.kt' '*.scala' '*.yaml' '*.yml' '*.json' \
               '*.html' '*.css' '*.scss' \
            > pr_diff.txt
          ADDED_LINES=$(grep -c '^+[^+]' pr_diff.txt || true)
          echo "Added lines in diff: $ADDED_LINES"
          echo "total_lines=$ADDED_LINES" >> $GITHUB_OUTPUT
          if [ "$ADDED_LINES" -gt "$MAX_TOTAL_LINES" ]; then
            echo "too_large=true" >> $GITHUB_OUTPUT
          else
            echo "too_large=false" >> $GITHUB_OUTPUT
          fi

      # Step 5: Hard stop if PR too large — apply label
      - name: Comment PR too large and label
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Post comment
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": \"## ⚠️ AI Code Review Skipped\n\n**Reason:** This PR has **${{ steps.validate_diff.outputs.total_lines }} added lines** which exceeds the limit of 1000 lines.\n\n**Please split this PR into smaller focused PRs.**\"}"

          # Apply label: ai:skipped-too-large
          python3 << 'LABEL_EOF'
          import urllib.request, json, os
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr = os.environ["PR_NUMBER"]

          def ensure_label(name, color, description):
              """Create label if it doesn't exist"""
              try:
                  data = json.dumps({"name": name, "color": color, "description": description}).encode()
                  req = urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/labels",
                      data=data,
                      headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
                  )
                  urllib.request.urlopen(req)
              except Exception:
                  pass  # label already exists

          def apply_label(name):
              data = json.dumps({"labels": [name]}).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{pr}/labels",
                  data=data,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)

          ensure_label("ai:skipped-too-large", "FFC107", "PR too large for AI review")
          apply_label("ai:skipped-too-large")
          print("Label applied: ai:skipped-too-large")
          LABEL_EOF

          exit 0

      # Step 6: Build valid lines from GitHub API + file-level chunks
      - name: Build valid lines from GitHub API and prepare file-level chunks
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          CONTEXT_LINES: ${{ env.CONTEXT_LINES }}
          MAX_LINES_PER_FILE: ${{ env.MAX_LINES_PER_FILE }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, re, os

          token        = os.environ["GITHUB_TOKEN"]
          repo         = os.environ["REPO"]
          pr_number    = os.environ["PR_NUMBER"]
          context_size = int(os.environ.get("CONTEXT_LINES", 10))
          max_per_file = int(os.environ.get("MAX_LINES_PER_FILE", 300))

          # --- PART A: valid lines from GitHub PR Files API ---
          valid = set()
          page = 1
          while True:
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}",
                  headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
              )
              with urllib.request.urlopen(req) as r:
                  files = json.loads(r.read())
              if not files:
                  break
              for f in files:
                  filepath = f["filename"]
                  patch = f.get("patch", "")
                  if not patch:
                      continue
                  current_line = 0
                  for patch_line in patch.split("\n"):
                      if patch_line.startswith("@@"):
                          m = re.search(r'\+(\d+)', patch_line)
                          if m:
                              current_line = int(m.group(1)) - 1
                      elif patch_line.startswith("+"):
                          current_line += 1
                          valid.add((filepath, current_line))
                      elif not patch_line.startswith("-"):
                          current_line += 1
              page += 1

          print(f"Valid lines from GitHub API: {len(valid)}")
          with open("valid_lines.json", "w") as out:
              json.dump([{"file": f, "line": l} for f, l in valid], out)

          # --- PART B: language map ---
          LANG_MAP = {
              "js": "JavaScript", "ts": "TypeScript", "tsx": "TypeScript/React",
              "jsx": "JavaScript/React", "py": "Python", "java": "Java",
              "go": "Go", "rb": "Ruby", "php": "PHP", "cs": "C#",
              "cpp": "C++", "c": "C", "h": "C/C++ Header", "rs": "Rust",
              "swift": "Swift", "kt": "Kotlin", "scala": "Scala",
              "yaml": "YAML", "yml": "YAML", "json": "JSON",
              "html": "HTML", "css": "CSS", "scss": "SCSS"
          }
          def get_language(fp):
              ext = fp.rsplit(".", 1)[-1].lower() if "." in fp else ""
              return LANG_MAP.get(ext, "Unknown")

          # --- PART C: parse local diff grouped by file ---
          files_data = {}
          current_file = None
          new_line = 0
          with open("pr_diff.txt", "r") as f:
              raw_lines = f.readlines()

          for line in raw_lines:
              if line.startswith("diff --git"):
                  parts = line.strip().split(" b/")
                  if len(parts) >= 2:
                      current_file = parts[-1].strip()
                      if current_file not in files_data:
                          files_data[current_file] = []
                  new_line = 0
              elif line.startswith("@@"):
                  m = re.search(r'\+(\d+)', line)
                  if m:
                      new_line = int(m.group(1)) - 1
              elif line.startswith("+") and not line.startswith("+++"):
                  new_line += 1
                  if current_file:
                      files_data[current_file].append({"line": new_line, "content": line[1:].rstrip()})
              elif not line.startswith("-") and not line.startswith("\\"):
                  new_line += 1

          # --- PART D: enrich with context + assign IDs, chunk by file ---
          chunks = []
          global_id_counter = 0

          for filepath, added_lines in files_data.items():
              if not added_lines:
                  continue
              all_file_lines = []
              if os.path.exists(filepath):
                  with open(filepath, "r", errors="ignore") as f:
                      all_file_lines = f.readlines()
              total_file_lines = len(all_file_lines)
              language = get_language(filepath)

              enriched = []
              for entry in added_lines:
                  n   = entry["line"]
                  lid = global_id_counter
                  global_id_counter += 1
                  ctx_before, ctx_after = [], []
                  if all_file_lines:
                      start = max(0, n - context_size - 1)
                      ctx_before = [
                          f"line {start+i+1}: {all_file_lines[start+i].rstrip()}"
                          for i in range(n - 1 - start)
                      ]
                      start_after = n
                      end_after = min(total_file_lines, n + context_size)
                      ctx_after = [
                          f"line {start_after+i+1}: {all_file_lines[start_after+i].rstrip()}"
                          for i in range(end_after - start_after)
                      ]
                  enriched.append({
                      "id": lid, "line": n,
                      "content": entry["content"],
                      "context_before": ctx_before,
                      "context_after":  ctx_after
                  })

              if len(enriched) <= max_per_file:
                  parts_list = [enriched]
              else:
                  parts_list, current_part = [], []
                  for item in enriched:
                      current_part.append(item)
                      if len(current_part) >= max_per_file and item["content"].strip() == "":
                          parts_list.append(current_part)
                          current_part = []
                  if current_part:
                      parts_list.append(current_part)

              for part_idx, part in enumerate(parts_list):
                  part_label = f" (part {part_idx+1}/{len(parts_list)})" if len(parts_list) > 1 else ""
                  chunks.append({
                      "file": filepath, "language": language,
                      "total_file_lines": total_file_lines,
                      "part_label": part_label, "lines": part
                  })

          with open("diff_chunks.json", "w") as out:
              json.dump(chunks, out, indent=2)

          total_added = sum(len(c["lines"]) for c in chunks)
          print(f"Files: {len(files_data)}, chunks: {len(chunks)}, lines: {total_added}")
          for c in chunks:
              print(f"  {c['file']}{c['part_label']}: {len(c['lines'])} added lines")
          EOF

      # Step 7: Call OpenAI per file chunk — collect review comments
      - name: Call OpenAI per file chunk and collect comments
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os, time

          with open("diff_chunks.json", "r") as f:
              chunks = json.load(f)

          api_key = os.environ["OPENAI_API_KEY"]
          all_comments = []

          id_map = {}
          for chunk in chunks:
              for item in chunk["lines"]:
                  id_map[item["id"]] = {"file": chunk["file"], "line": item["line"]}

          for idx, chunk in enumerate(chunks):
              filepath    = chunk["file"]
              language    = chunk["language"]
              total_lines = chunk["total_file_lines"]
              part_label  = chunk["part_label"]
              added_lines = chunk["lines"]

              print(f"\nReviewing: {filepath}{part_label} ({len(added_lines)} changes in {total_lines}-line file)")

              diff_text = ""
              for item in added_lines:
                  diff_text += f"\n--- ID:{item['id']} (line {item['line']}) ---\n"
                  if item["context_before"]:
                      diff_text += "Context before:\n"
                      for c in item["context_before"]:
                          diff_text += f"  {c}\n"
                  diff_text += f">>> ADDED LINE {item['line']} (ID:{item['id']}): {item['content']}\n"
                  if item["context_after"]:
                      diff_text += "Context after:\n"
                      for c in item["context_after"]:
                          diff_text += f"  {c}\n"

              system_prompt = (
                  "You are a senior software engineer doing a thorough, file-aware code review. "
                  "You see ALL changes in a single file at once, just like a real code reviewer would. "
                  "You respond ONLY with a valid JSON array. "
                  "No markdown fences, no explanation, no preamble. "
                  "If there are no issues return exactly: []"
              )

              user_prompt = (
                  f"You are reviewing changes to: {filepath}{part_label}\n"
                  f"Language: {language}\n"
                  f"File size: {total_lines} lines total\n"
                  f"Changes in this review: {len(added_lines)} added lines\n"
                  "\n"
                  "You can see ALL changes in this file plus surrounding context.\n"
                  "Each changed line is marked with >>> and identified by ID:N.\n"
                  "Context lines are for understanding only — do NOT flag them.\n"
                  "\n"
                  "FLAG a line ONLY for genuine objective issues:\n"
                  "  - Security vulnerabilities (injection, exposed secrets, broken auth)\n"
                  "  - Bugs causing crashes, data loss, or wrong results\n"
                  "  - Missing error handling on I/O, network, or DB calls\n"
                  "  - Race conditions or concurrency bugs\n"
                  "  - Obvious performance issues (N+1 queries, unbounded loops)\n"
                  "  - Resource leaks (unclosed files, connections, handles)\n"
                  "  - Hardcoded secrets or magic values\n"
                  "  - Null/undefined safety issues — missing checks that will crash at runtime\n"
                  "\n"
                  "SINCE YOU SEE THE FULL FILE:\n"
                  "  - Flag first occurrence of a repeated pattern, mention it applies broadly\n"
                  "  - If risky in isolation but safe in context, do NOT flag\n"
                  "\n"
                  "DO NOT FLAG: style, naming, formatting, architectural opinions,\n"
                  "issues handled in context, test files (unless definite bug)\n"
                  "\n"
                  "OUTPUT — JSON array, each object must have exactly:\n"
                  '  "id"           : integer from ID:N\n'
                  '  "comment"      : one sentence — specific problem and exact fix\n'
                  '  "testable"     : true if this is a null/undefined safety or logic bug '
                  'that can be proven with a pure function test (no DB/network needed), false otherwise\n'
                  '  "function_name": the function/method name containing this line, or "" if not in a function\n'
                  "\n"
                  'Example: [ {"id": 3, "comment": "...", "testable": true, "function_name": "formatTravelPlan"} ]\n'
                  "If no issues: []\n"
                  "\nCHANGES TO REVIEW:\n" + diff_text
              )

              payload = {
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user",   "content": user_prompt}
                  ],
                  "max_tokens": 2000,
                  "temperature": 0.1
              }

              for attempt in range(3):
                  try:
                      req = urllib.request.Request(
                          "https://api.openai.com/v1/chat/completions",
                          data=json.dumps(payload).encode(),
                          headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}
                      )
                      with urllib.request.urlopen(req) as response:
                          data = json.loads(response.read())

                      raw = data["choices"][0]["message"]["content"].strip()
                      if raw.startswith("```"):
                          raw = "\n".join(raw.split("\n")[1:])
                      if raw.endswith("```"):
                          raw = "\n".join(raw.split("\n")[:-1])
                      raw = raw.strip()

                      file_comments = json.loads(raw)
                      resolved = []
                      for c in file_comments:
                          lid = int(c["id"])
                          if lid in id_map:
                              resolved.append({
                                  "file":          id_map[lid]["file"],
                                  "line":          id_map[lid]["line"],
                                  "comment":       c["comment"],
                                  "testable":      c.get("testable", False),
                                  "function_name": c.get("function_name", "")
                              })
                      all_comments.extend(resolved)
                      print(f"  -> {len(resolved)} comments ({sum(1 for r in resolved if r['testable'])} testable)")
                      break

                  except Exception as e:
                      print(f"  Attempt {attempt+1} failed: {e}")
                      if attempt < 2:
                          wait = 2 ** attempt
                          print(f"  Retrying in {wait}s...")
                          time.sleep(wait)
                      else:
                          print(f"  Skipping {filepath} after 3 attempts")

              if idx < len(chunks) - 1:
                  time.sleep(1)

          with open("line_comments.json", "w") as f:
              json.dump(all_comments, f, indent=2)
          print(f"\nTotal comments: {len(all_comments)}")
          EOF

      # Step 8: Apply PR labels based on review results
      - name: Apply PR labels based on review results
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr = os.environ["PR_NUMBER"]

          with open("line_comments.json", "r") as f:
              comments = json.load(f)

          def ensure_label(name, color, description):
              try:
                  data = json.dumps({"name": name, "color": color, "description": description}).encode()
                  req = urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/labels",
                      data=data,
                      headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
                  )
                  urllib.request.urlopen(req)
                  print(f"Created label: {name}")
              except Exception:
                  pass  # already exists

          def apply_label(name):
              data = json.dumps({"labels": [name]}).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{pr}/labels",
                  data=data,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)
              print(f"Applied label: {name}")

          # Ensure all AI labels exist
          ensure_label("ai:clean",            "0E8A16", "AI review found no issues")
          ensure_label("ai:issues-found",     "D93F0B", "AI review found issues to fix")
          ensure_label("ai:has-testable-bugs","B60205", "AI found bugs confirmable by auto-tests")

          total = len(comments)
          testable = sum(1 for c in comments if c.get("testable", False))

          if total == 0:
              apply_label("ai:clean")
              print("No issues found — PR is clean")
          else:
              apply_label("ai:issues-found")
              if testable > 0:
                  apply_label("ai:has-testable-bugs")
              print(f"Issues found: {total} total, {testable} testable")
          EOF

      # Step 9: Update metrics badge JSON and commit
      - name: Update AI review metrics badge
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, datetime

          with open("line_comments.json", "r") as f:
              comments = json.load(f)

          total_issues = len(comments)
          testable = sum(1 for c in comments if c.get("testable", False))
          files_reviewed = len(set(c["file"] for c in comments)) if comments else 0

          # --- Load or initialize cumulative metrics ---
          metrics_file = ".ai-review/metrics.json"
          os.makedirs(".ai-review", exist_ok=True)

          if os.path.exists(metrics_file):
              with open(metrics_file, "r") as f:
                  metrics = json.load(f)
          else:
              metrics = {
                  "total_prs_reviewed": 0,
                  "total_issues_found": 0,
                  "total_testable_bugs": 0,
                  "total_clean_prs": 0,
                  "history": []
              }

          # --- Update cumulative metrics ---
          metrics["total_prs_reviewed"] += 1
          metrics["total_issues_found"] += total_issues
          metrics["total_testable_bugs"] += testable
          if total_issues == 0:
              metrics["total_clean_prs"] += 1

          # Add this PR to history
          metrics["history"].append({
              "pr": int(os.environ["PR_NUMBER"]),
              "date": datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC"),
              "issues": total_issues,
              "testable": testable,
              "files": files_reviewed
          })

          # Keep last 100 entries only
          metrics["history"] = metrics["history"][-100:]

          with open(metrics_file, "w") as f:
              json.dump(metrics, f, indent=2)

          # --- Generate Shields.io badge JSONs ---
          total_prs = metrics["total_prs_reviewed"]
          total_bugs = metrics["total_issues_found"]
          clean_prs = metrics["total_clean_prs"]
          confirmed = metrics["total_testable_bugs"]

          # Badge 1: PRs Reviewed
          with open(".ai-review/badge-prs-reviewed.json", "w") as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "AI Reviewed PRs",
                  "message": str(total_prs),
                  "color": "blue"
              }, f)

          # Badge 2: Issues Found
          with open(".ai-review/badge-issues-found.json", "w") as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "AI Issues Found",
                  "message": str(total_bugs),
                  "color": "orange" if total_bugs > 0 else "green"
              }, f)

          # Badge 3: Clean PR Rate
          clean_rate = f"{round(clean_prs / total_prs * 100)}%" if total_prs > 0 else "N/A"
          color = "brightgreen" if total_prs > 0 and (clean_prs / total_prs) >= 0.7 else "yellow"
          with open(".ai-review/badge-clean-rate.json", "w") as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "Clean PR Rate",
                  "message": clean_rate,
                  "color": color
              }, f)

          # Badge 4: Testable Bugs Confirmed
          with open(".ai-review/badge-testable-bugs.json", "w") as f:
              json.dump({
                  "schemaVersion": 1,
                  "label": "Testable Bugs",
                  "message": str(confirmed),
                  "color": "red" if confirmed > 0 else "brightgreen"
              }, f)

          print(f"Metrics updated: {total_prs} PRs, {total_bugs} issues, {clean_rate} clean rate")
          EOF

          # --- Commit badge files to ai-metrics branch ---
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save generated files before switching branch
          cp -r .ai-review /tmp/.ai-review-backup

          # Switch to ai-metrics branch (fetch it or create orphan if first run)
          git fetch origin ai-metrics || true
          if git rev-parse --verify origin/ai-metrics >/dev/null 2>&1; then
            git checkout ai-metrics
          else
            git checkout --orphan ai-metrics
            git rm -rf . 2>/dev/null || true
            git commit --allow-empty -m "init: ai-metrics branch for AI review badges"
          fi

          # Copy badge files into this branch
          cp -r /tmp/.ai-review-backup .ai-review
          git add .ai-review/

          if git diff --cached --quiet; then
            echo "No badge changes to commit"
          else
            git commit -m "chore: update AI review metrics — PR #$PR_NUMBER [skip ci]"
            git push origin ai-metrics
            echo "Badges committed and pushed to ai-metrics branch"
          fi

