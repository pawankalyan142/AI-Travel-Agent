name: AI Code Review (Final Fixed)

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CHUNK_SIZE: 200
  MAX_TOTAL_LINES: 1000
  CONTEXT_LINES: 5

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # STEP 1: Check already reviewed
      - name: Check if AI already reviewed
        id: check_reviewed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          token = os.environ["GITHUB_TOKEN"]
          repo = "${{ github.repository }}"
          pr = "${{ github.event.pull_request.number }}"

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr}/comments",
              headers={"Authorization": f"Bearer {token}"}
          )
          comments = json.loads(urllib.request.urlopen(req).read())

          already = any("AI Code Review Complete" in c["body"] for c in comments)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_reviewed={'true' if already else 'false'}\n")
          EOF

      - name: Stop if already reviewed
        if: steps.check_reviewed.outputs.already_reviewed == 'true'
        run: echo "Already reviewed, skipping"

      # STEP 2: Get diff
      - name: Get diff
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      # STEP 3: Parse diff with POSITION (FIXED)
      - name: Parse diff
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        run: |
          python3 << 'EOF'
          import json, re

          diff_lines = open("pr_diff.txt").readlines()

          file = None
          new_line = 0
          position = 0
          data = []

          for line in diff_lines:
              if line.startswith("diff --git"):
                  file = re.search(r'b/(.+)', line).group(1)
                  position = 0

              elif line.startswith("@@"):
                  match = re.search(r'\+(\d+)', line)
                  if match:
                      new_line = int(match.group(1)) - 1
                  position = 0

              elif line.startswith("+") and not line.startswith("+++"):
                  new_line += 1
                  position += 1

                  data.append({
                      "file": file,
                      "line": new_line,
                      "position": position,
                      "content": line[1:].strip()
                  })

              elif not line.startswith("-"):
                  new_line += 1
                  position += 1

          with open("diff.json", "w") as f:
              json.dump(data, f)

          print(f"Parsed {len(data)} changed lines")
          EOF

      # STEP 4: Call OpenAI
      - name: Call AI
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os

          data = json.load(open("diff.json"))

          prompt = "\n".join(
              f"ID:{i} -> {d['content']}" for i, d in enumerate(data)
          )

          req = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=json.dumps({
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": "Return JSON only"},
                      {"role": "user", "content": prompt}
                  ]
              }).encode(),
              headers={
                  "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}",
                  "Content-Type": "application/json"
              }
          )

          res = json.loads(urllib.request.urlopen(req).read())
          raw = res["choices"][0]["message"]["content"]

          comments = json.loads(raw)

          resolved = []
          for c in comments:
              d = data[c["id"]]
              resolved.append({
                  "file": d["file"],
                  "position": d["position"],
                  "comment": c["comment"]
              })

          json.dump(resolved, open("comments.json", "w"))
          print(f"AI comments: {len(resolved)}")
          EOF

      # STEP 5: Post comments (FIXED USING POSITION)
      - name: Post comments
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os

          comments = json.load(open("comments.json"))

          repo = "${{ github.repository }}"
          pr = "${{ github.event.pull_request.number }}"
          sha = "${{ github.event.pull_request.head.sha }}"
          token = os.environ["GITHUB_TOKEN"]

          posted = failed = 0

          for c in comments:
              payload = {
                  "body": "🤖 " + c["comment"],
                  "commit_id": sha,
                  "path": c["file"],
                  "position": c["position"]
              }

              try:
                  req = urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/pulls/{pr}/comments",
                      data=json.dumps(payload).encode(),
                      headers={
                          "Authorization": f"Bearer {token}",
                          "Content-Type": "application/json"
                      }
                  )
                  urllib.request.urlopen(req)
                  posted += 1
              except Exception as e:
                  failed += 1

          print(f"Posted: {posted}, Failed: {failed}")
          EOF

      # STEP 6: Final summary
      - name: Summary
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            -d '{"body":"✅ AI Code Review Complete"}'
