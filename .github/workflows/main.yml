name: AI Code Review (Final)

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  MAX_TOTAL_LINES: 1000
  MAX_LINES_PER_FILE: 300
  CONTEXT_LINES: 10

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout full repo
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Check if AI already reviewed this PR
      - name: Check if AI already reviewed this PR
        id: check_reviewed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments?per_page=100",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              comments = json.loads(r.read())
          already_reviewed = any(
              "AI Code Review Complete" in c.get("body", "") or
              "AI Code Review Skipped" in c.get("body", "")
              for c in comments
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_reviewed={'true' if already_reviewed else 'false'}\n")
          print(f"Already reviewed: {already_reviewed}")
          EOF

      # Step 3: Stop if already reviewed
      - name: Post already reviewed comment and stop
        if: steps.check_reviewed.outputs.already_reviewed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": \"## \u2139\ufe0f AI Review Already Done\n\n\u2705 AI has already reviewed this PR once. No further AI reviews will run.\n\n**Next step:** Please fix the AI comments and request a **peer review** from your teammates.\"}"

      # Step 4: Get diff and validate size
      - name: Get PR diff and validate size
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        id: validate_diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.js' '*.ts' '*.tsx' '*.jsx' \
               '*.java' '*.go' '*.rb' '*.php' '*.cs' \
               '*.cpp' '*.c' '*.h' '*.rs' '*.swift' \
               '*.kt' '*.scala' '*.yaml' '*.yml' '*.json' \
               '*.html' '*.css' '*.scss' \
            > pr_diff.txt
          ADDED_LINES=$(grep -c '^+[^+]' pr_diff.txt || true)
          echo "Added lines in diff: $ADDED_LINES"
          echo "total_lines=$ADDED_LINES" >> $GITHUB_OUTPUT
          if [ "$ADDED_LINES" -gt "$MAX_TOTAL_LINES" ]; then
            echo "too_large=true" >> $GITHUB_OUTPUT
          else
            echo "too_large=false" >> $GITHUB_OUTPUT
          fi

      # Step 5: Hard stop if PR too large
      - name: Comment PR too large and exit
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": \"## \u26a0\ufe0f AI Code Review Skipped\n\n**Reason:** This PR has **${{ steps.validate_diff.outputs.total_lines }} added lines** which exceeds the limit of 1000 lines.\n\n**Please split this PR into smaller focused PRs.**\"}"
          exit 0

      # Step 6: Build valid lines from GitHub API + file-level chunks
      - name: Build valid lines from GitHub API and prepare file-level chunks
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          CONTEXT_LINES: ${{ env.CONTEXT_LINES }}
          MAX_LINES_PER_FILE: ${{ env.MAX_LINES_PER_FILE }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, re, os

          token        = os.environ["GITHUB_TOKEN"]
          repo         = os.environ["REPO"]
          pr_number    = os.environ["PR_NUMBER"]
          context_size = int(os.environ.get("CONTEXT_LINES", 10))
          max_per_file = int(os.environ.get("MAX_LINES_PER_FILE", 300))

          # --- PART A: valid lines from GitHub PR Files API ---
          valid = set()
          page = 1
          while True:
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}",
                  headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
              )
              with urllib.request.urlopen(req) as r:
                  files = json.loads(r.read())
              if not files:
                  break
              for f in files:
                  filepath = f["filename"]
                  patch = f.get("patch", "")
                  if not patch:
                      continue
                  current_line = 0
                  for patch_line in patch.split("\n"):
                      if patch_line.startswith("@@"):
                          m = re.search(r'\+(\d+)', patch_line)
                          if m:
                              current_line = int(m.group(1)) - 1
                      elif patch_line.startswith("+"):
                          current_line += 1
                          valid.add((filepath, current_line))
                      elif not patch_line.startswith("-"):
                          current_line += 1
              page += 1

          print(f"Valid lines from GitHub API: {len(valid)}")
          with open("valid_lines.json", "w") as out:
              json.dump([{"file": f, "line": l} for f, l in valid], out)

          # --- PART B: language map ---
          LANG_MAP = {
              "js": "JavaScript", "ts": "TypeScript", "tsx": "TypeScript/React",
              "jsx": "JavaScript/React", "py": "Python", "java": "Java",
              "go": "Go", "rb": "Ruby", "php": "PHP", "cs": "C#",
              "cpp": "C++", "c": "C", "h": "C/C++ Header", "rs": "Rust",
              "swift": "Swift", "kt": "Kotlin", "scala": "Scala",
              "yaml": "YAML", "yml": "YAML", "json": "JSON",
              "html": "HTML", "css": "CSS", "scss": "SCSS"
          }
          def get_language(fp):
              ext = fp.rsplit(".", 1)[-1].lower() if "." in fp else ""
              return LANG_MAP.get(ext, "Unknown")

          # --- PART C: parse local diff grouped by file ---
          files_data = {}
          current_file = None
          new_line = 0
          with open("pr_diff.txt", "r") as f:
              raw_lines = f.readlines()

          for line in raw_lines:
              if line.startswith("diff --git"):
                  parts = line.strip().split(" b/")
                  if len(parts) >= 2:
                      current_file = parts[-1].strip()
                      if current_file not in files_data:
                          files_data[current_file] = []
                  new_line = 0
              elif line.startswith("@@"):
                  m = re.search(r'\+(\d+)', line)
                  if m:
                      new_line = int(m.group(1)) - 1
              elif line.startswith("+") and not line.startswith("+++"):
                  new_line += 1
                  if current_file:
                      files_data[current_file].append({"line": new_line, "content": line[1:].rstrip()})
              elif not line.startswith("-") and not line.startswith("\\"):
                  new_line += 1

          # --- PART D: enrich with context + assign IDs, chunk by file ---
          chunks = []
          global_id_counter = 0

          for filepath, added_lines in files_data.items():
              if not added_lines:
                  continue
              all_file_lines = []
              if os.path.exists(filepath):
                  with open(filepath, "r", errors="ignore") as f:
                      all_file_lines = f.readlines()
              total_file_lines = len(all_file_lines)
              language = get_language(filepath)

              enriched = []
              for entry in added_lines:
                  n   = entry["line"]
                  lid = global_id_counter
                  global_id_counter += 1
                  ctx_before, ctx_after = [], []
                  if all_file_lines:
                      start = max(0, n - context_size - 1)
                      ctx_before = [
                          f"line {start+i+1}: {all_file_lines[start+i].rstrip()}"
                          for i in range(n - 1 - start)
                      ]
                      start_after = n
                      end_after = min(total_file_lines, n + context_size)
                      ctx_after = [
                          f"line {start_after+i+1}: {all_file_lines[start_after+i].rstrip()}"
                          for i in range(end_after - start_after)
                      ]
                  enriched.append({
                      "id": lid, "line": n,
                      "content": entry["content"],
                      "context_before": ctx_before,
                      "context_after":  ctx_after
                  })

              if len(enriched) <= max_per_file:
                  parts_list = [enriched]
              else:
                  parts_list, current_part = [], []
                  for item in enriched:
                      current_part.append(item)
                      if len(current_part) >= max_per_file and item["content"].strip() == "":
                          parts_list.append(current_part)
                          current_part = []
                  if current_part:
                      parts_list.append(current_part)

              for part_idx, part in enumerate(parts_list):
                  part_label = f" (part {part_idx+1}/{len(parts_list)})" if len(parts_list) > 1 else ""
                  chunks.append({
                      "file": filepath, "language": language,
                      "total_file_lines": total_file_lines,
                      "part_label": part_label, "lines": part
                  })

          with open("diff_chunks.json", "w") as out:
              json.dump(chunks, out, indent=2)

          total_added = sum(len(c["lines"]) for c in chunks)
          print(f"Files: {len(files_data)}, chunks: {len(chunks)}, lines: {total_added}")
          for c in chunks:
              print(f"  {c['file']}{c['part_label']}: {len(c['lines'])} added lines")
          EOF

      # Step 7: Call OpenAI per file chunk — collect review comments
      - name: Call OpenAI per file chunk and collect comments
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os, time

          with open("diff_chunks.json", "r") as f:
              chunks = json.load(f)

          api_key = os.environ["OPENAI_API_KEY"]
          all_comments = []

          id_map = {}
          for chunk in chunks:
              for item in chunk["lines"]:
                  id_map[item["id"]] = {"file": chunk["file"], "line": item["line"]}

          for idx, chunk in enumerate(chunks):
              filepath    = chunk["file"]
              language    = chunk["language"]
              total_lines = chunk["total_file_lines"]
              part_label  = chunk["part_label"]
              added_lines = chunk["lines"]

              print(f"\nReviewing: {filepath}{part_label} ({len(added_lines)} changes in {total_lines}-line file)")

              diff_text = ""
              for item in added_lines:
                  diff_text += f"\n--- ID:{item['id']} (line {item['line']}) ---\n"
                  if item["context_before"]:
                      diff_text += "Context before:\n"
                      for c in item["context_before"]:
                          diff_text += f"  {c}\n"
                  diff_text += f">>> ADDED LINE {item['line']} (ID:{item['id']}): {item['content']}\n"
                  if item["context_after"]:
                      diff_text += "Context after:\n"
                      for c in item["context_after"]:
                          diff_text += f"  {c}\n"

              system_prompt = (
                  "You are a senior software engineer doing a thorough, file-aware code review. "
                  "You see ALL changes in a single file at once, just like a real code reviewer would. "
                  "You respond ONLY with a valid JSON array. "
                  "No markdown fences, no explanation, no preamble. "
                  "If there are no issues return exactly: []"
              )

              user_prompt = (
                  f"You are reviewing changes to: {filepath}{part_label}\n"
                  f"Language: {language}\n"
                  f"File size: {total_lines} lines total\n"
                  f"Changes in this review: {len(added_lines)} added lines\n"
                  "\n"
                  "You can see ALL changes in this file plus surrounding context.\n"
                  "Each changed line is marked with >>> and identified by ID:N.\n"
                  "Context lines are for understanding only — do NOT flag them.\n"
                  "\n"
                  "FLAG a line ONLY for genuine objective issues:\n"
                  "  - Security vulnerabilities (injection, exposed secrets, broken auth)\n"
                  "  - Bugs causing crashes, data loss, or wrong results\n"
                  "  - Missing error handling on I/O, network, or DB calls\n"
                  "  - Race conditions or concurrency bugs\n"
                  "  - Obvious performance issues (N+1 queries, unbounded loops)\n"
                  "  - Resource leaks (unclosed files, connections, handles)\n"
                  "  - Hardcoded secrets or magic values\n"
                  "  - Null/undefined safety issues — missing checks that will crash at runtime\n"
                  "\n"
                  "SINCE YOU SEE THE FULL FILE:\n"
                  "  - Flag first occurrence of a repeated pattern, mention it applies broadly\n"
                  "  - If risky in isolation but safe in context, do NOT flag\n"
                  "\n"
                  "DO NOT FLAG: style, naming, formatting, architectural opinions,\n"
                  "issues handled in context, test files (unless definite bug)\n"
                  "\n"
                  "OUTPUT — JSON array, each object must have exactly:\n"
                  '  "id"           : integer from ID:N\n'
                  '  "comment"      : one sentence — specific problem and exact fix\n'
                  '  "testable"     : true if this is a null/undefined safety or logic bug '
                  'that can be proven with a pure function test (no DB/network needed), false otherwise\n'
                  '  "function_name": the function/method name containing this line, or "" if not in a function\n'
                  "\n"
                  'Example: [ {"id": 3, "comment": "...", "testable": true, "function_name": "formatTravelPlan"} ]\n'
                  "If no issues: []\n"
                  "\nCHANGES TO REVIEW:\n" + diff_text
              )

              payload = {
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user",   "content": user_prompt}
                  ],
                  "max_tokens": 2000,
                  "temperature": 0.1
              }

              for attempt in range(3):
                  try:
                      req = urllib.request.Request(
                          "https://api.openai.com/v1/chat/completions",
                          data=json.dumps(payload).encode(),
                          headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}
                      )
                      with urllib.request.urlopen(req) as response:
                          data = json.loads(response.read())

                      raw = data["choices"][0]["message"]["content"].strip()
                      if raw.startswith("```"):
                          raw = "\n".join(raw.split("\n")[1:])
                      if raw.endswith("```"):
                          raw = "\n".join(raw.split("\n")[:-1])
                      raw = raw.strip()

                      file_comments = json.loads(raw)
                      resolved = []
                      for c in file_comments:
                          lid = int(c["id"])
                          if lid in id_map:
                              resolved.append({
                                  "file":          id_map[lid]["file"],
                                  "line":          id_map[lid]["line"],
                                  "comment":       c["comment"],
                                  "testable":      c.get("testable", False),
                                  "function_name": c.get("function_name", "")
                              })
                      all_comments.extend(resolved)
                      print(f"  -> {len(resolved)} comments ({sum(1 for r in resolved if r['testable'])} testable)")
                      break

                  except Exception as e:
                      print(f"  Attempt {attempt+1} failed: {e}")
                      if attempt < 2:
                          wait = 2 ** attempt
                          print(f"  Retrying in {wait}s...")
                          time.sleep(wait)
                      else:
                          print(f"  Skipping {filepath} after 3 attempts")

              if idx < len(chunks) - 1:
                  time.sleep(1)

          with open("line_comments.json", "w") as f:
              json.dump(all_comments, f, indent=2)
          print(f"\nTotal comments: {len(all_comments)}")
          EOF

      # Step 8: Generate and run unit tests for testable findings
      #
      # PHASE 1 TEST GENERATION — Design decisions:
      #
      # 1. TOKEN BUDGET: max 5 findings get tests (most testable ones first)
      #    One OpenAI call per finding — but we send ONLY the function body,
      #    not the whole file. Keeps tokens low.
      #
      # 2. NO FRAMEWORK: we use plain `node` for JS/TS and `python3` for Python.
      #    Zero npm install. Zero setup. Runs in seconds.
      #    For TS files we strip types with a simple regex — good enough for
      #    pure function testing without a full TypeScript compiler.
      #
      # 3. TEST DESIGN RULE: AI must write tests that FAIL on buggy code.
      #    Not happy-path tests. Tests that expose the exact flagged weakness.
      #
      # 4. RESULT: each finding gets a verdict — CONFIRMED (test failed = bug real)
      #    or UNCONFIRMED (test passed = may be false positive)
      - name: Generate and run unit tests for testable findings
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os, subprocess, re, time

          with open("line_comments.json") as f:
              all_comments = json.load(f)

          api_key = os.environ["OPENAI_API_KEY"]

          # --- Pick up to 5 testable findings (JS/TS/Python only for Phase 1) ---
          TESTABLE_EXTS = {".js", ".ts", ".tsx", ".jsx", ".py"}

          testable = [
              c for c in all_comments
              if c.get("testable") and
                 c.get("function_name") and
                 any(c["file"].endswith(ext) for ext in TESTABLE_EXTS)
          ][:5]   # hard cap — token budget

          print(f"Testable findings selected: {len(testable)} of {len(all_comments)} total")

          test_results = []

          for finding in testable:
              filepath      = finding["file"]
              line_num      = finding["line"]
              comment       = finding["comment"]
              function_name = finding["function_name"]
              is_python     = filepath.endswith(".py")
              is_ts         = filepath.endswith((".ts", ".tsx"))

              print(f"\nGenerating test for: {function_name}() in {filepath} line {line_num}")

              # --- Extract the function body from the actual file ---
              function_code = ""
              if os.path.exists(filepath):
                  with open(filepath, "r", errors="ignore") as f:
                      source = f.read()

                  # Simple extraction: find the function and grab ~40 lines
                  # Handles: function foo(), const foo = (), foo() {}, async foo()
                  patterns = [
                      rf'((?:export\s+)?(?:async\s+)?function\s+{re.escape(function_name)}\s*\([^)]*\)[^{{]*{{)',
                      rf'((?:export\s+)?(?:const|let|var)\s+{re.escape(function_name)}\s*=\s*(?:async\s+)?(?:\([^)]*\)|[^=]+)\s*=>)',
                      rf'((?:async\s+)?{re.escape(function_name)}\s*\([^)]*\)\s*(?::\s*\w+)?\s*{{)',
                  ]
                  start_idx = -1
                  for pattern in patterns:
                      m = re.search(pattern, source)
                      if m:
                          start_idx = m.start()
                          break

                  if start_idx >= 0:
                      # Grab from function start, take up to 50 lines
                      snippet = source[start_idx:]
                      lines = snippet.split("\n")[:50]
                      function_code = "\n".join(lines)
                  else:
                      # Fallback: grab 30 lines around the flagged line
                      all_lines = source.split("\n")
                      start = max(0, line_num - 15)
                      end   = min(len(all_lines), line_num + 15)
                      function_code = "\n".join(all_lines[start:end])

              if not function_code.strip():
                  print(f"  Could not extract function code — skipping")
                  continue

              # --- Ask AI to generate tests ---
              # Key constraint: send ONLY the function, not the whole file
              # This is what keeps token usage low
              lang_label = "Python" if is_python else "TypeScript/JavaScript"

              test_prompt = (
                  f"You are generating a unit test to PROVE a bug exists in this {lang_label} function.\n\n"
                  f"FUNCTION:\n```\n{function_code}\n```\n\n"
                  f"BUG REPORTED: {comment}\n\n"
                  "Write 2-3 test cases as a self-contained executable script.\n"
                  "CRITICAL RULES:\n"
                  "  1. Tests must target the EXACT weakness described above\n"
                  "  2. Tests should FAIL on the current buggy code and PASS after fix\n"
                  "  3. Use only plain values — no mocks, no frameworks, no imports\n"
                  "     For JS/TS: copy the function inline, use console.log PASS/FAIL\n"
                  "     For Python: copy the function inline, use print PASS/FAIL\n"
                  "  4. Each test must print exactly: 'PASS: <description>' or 'FAIL: <description> | Error: <msg>'\n"
                  "  5. Wrap each test in try/catch (JS) or try/except (Python)\n"
                  "  6. Script must NOT crash — catch all errors and report FAIL\n"
                  "  7. Do NOT use import, require, or any external dependency\n"
                  "  8. Copy the function definition inline into the script\n\n"
                  "Return ONLY the raw executable script. No markdown, no explanation.\n"
              )

              payload = {
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": "You are a test engineer. Return only raw executable code. No markdown."},
                      {"role": "user",   "content": test_prompt}
                  ],
                  "max_tokens": 800,   # tight budget — just the test script
                  "temperature": 0.1
              }

              test_script = ""
              for attempt in range(2):
                  try:
                      req = urllib.request.Request(
                          "https://api.openai.com/v1/chat/completions",
                          data=json.dumps(payload).encode(),
                          headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}
                      )
                      with urllib.request.urlopen(req) as response:
                          data = json.loads(response.read())
                      test_script = data["choices"][0]["message"]["content"].strip()
                      # Strip markdown fences if model disobeys
                      if test_script.startswith("```"):
                          lines = test_script.split("\n")
                          test_script = "\n".join(lines[1:])
                      if test_script.endswith("```"):
                          lines = test_script.split("\n")
                          test_script = "\n".join(lines[:-1])
                      test_script = test_script.strip()
                      break
                  except Exception as e:
                      print(f"  Test gen attempt {attempt+1} failed: {e}")
                      time.sleep(1)

              if not test_script:
                  print(f"  Test generation failed — skipping")
                  continue

              # --- Run the test script ---
              script_file = f"test_finding_{line_num}.{'py' if is_python else 'js'}"
              with open(script_file, "w") as f:
                  f.write(test_script)

              runner = "python3" if is_python else "node"
              try:
                  result = subprocess.run(
                      [runner, script_file],
                      capture_output=True, text=True, timeout=15
                  )
                  output = result.stdout + result.stderr
              except subprocess.TimeoutExpired:
                  output = "TIMEOUT: test took more than 15 seconds"
              except Exception as e:
                  output = f"RUNNER ERROR: {e}"

              print(f"  Test output:\n{output}")

              # --- Parse results ---
              pass_lines = [l for l in output.split("\n") if l.strip().startswith("PASS")]
              fail_lines = [l for l in output.split("\n") if l.strip().startswith("FAIL")]

              passed = len(pass_lines)
              failed = len(fail_lines)

              # A finding is CONFIRMED if at least one test failed
              # (meaning the bug actually exists and the test caught it)
              status = "CONFIRMED" if failed > 0 else "UNCONFIRMED"

              test_results.append({
                  "file":          filepath,
                  "line":          line_num,
                  "function_name": function_name,
                  "comment":       comment,
                  "status":        status,
                  "passed":        passed,
                  "failed":        failed,
                  "pass_lines":    pass_lines,
                  "fail_lines":    fail_lines,
                  "script":        test_script
              })

              print(f"  -> {status}: {passed} passed, {failed} failed")
              time.sleep(1)  # small delay between OpenAI calls

          with open("test_results.json", "w") as f:
              json.dump(test_results, f, indent=2)
          print(f"\nTest generation complete: {len(test_results)} functions tested")
          EOF

      # Step 9: Post comments — two-tier, zero lost
      - name: Post comments (inline + fallback for out-of-diff lines)
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, urllib.error, os

          with open("line_comments.json", "r") as f:
              comments = json.load(f)
          with open("valid_lines.json", "r") as f:
              valid_list = json.load(f)
          with open("test_results.json", "r") as f:
              test_results = json.load(f)

          # Build a lookup so we can append test results to the right comment
          test_lookup = {(t["file"], t["line"]): t for t in test_results}

          valid = {(e["file"], e["line"]) for e in valid_list}

          token      = os.environ["GITHUB_TOKEN"]
          repo       = os.environ["REPO"]
          pr_number  = os.environ["PR_NUMBER"]
          commit_sha = os.environ["PR_COMMIT_SHA"]

          posted   = 0
          fallback = []

          for item in comments:
              key = (item["file"], item["line"])

              # Build comment body — append test result if available
              body = f"\U0001f916 **AI Review:** {item['comment']}"

              if key in test_lookup:
                  t = test_lookup[key]
                  if t["status"] == "CONFIRMED":
                      body += f"\n\n**\U0001f9ea Test Result: \U0001f534 BUG CONFIRMED**\n"
                      body += f"Ran `{t['function_name']}()` with edge case inputs — {t['failed']} test(s) failed:\n"
                      for fl in t["fail_lines"][:3]:
                          body += f"- `{fl.strip()}`\n"
                      if t["passed"] > 0:
                          body += f"\n{t['passed']} test(s) passed. Fix the failing cases above."
                  else:
                      body += f"\n\n**\U0001f9ea Test Result: \u2705 UNCONFIRMED**\n"
                      body += f"Ran `{t['function_name']}()` with edge case inputs — all {t['passed']} test(s) passed.\n"
                      body += "This finding may not apply to your current code — review manually."

              if key not in valid:
                  fallback.append({"body": body, "file": item["file"], "line": item["line"]})
                  print(f"Queued for fallback: {item['file']} line {item['line']}")
                  continue

              payload = {
                  "body":      body,
                  "commit_id": commit_sha,
                  "path":      item["file"],
                  "line":      item["line"],
                  "side":      "RIGHT"
              }
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/pulls/{pr_number}/comments",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github.v3+json"
                  }
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      if r.status == 201:
                          posted += 1
                          print(f"Inline: {item['file']} @ {item['line']}")
              except urllib.error.HTTPError as e:
                  fallback.append({"body": body, "file": item["file"], "line": item["line"]})
                  print(f"Recovered to fallback: {item['file']} line {item['line']}: {e.read().decode()}")

          if fallback:
              body_lines = [
                  "\U0001f916 **AI Review \u2014 Additional Findings**\n",
                  "The following issues could not be posted inline (outside the diff view):\n"
              ]
              for item in fallback:
                  body_lines.append(f"- **`{item['file']}` line {item['line']}:** {item['body']}")
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
                  data=json.dumps({"body": "\n".join(body_lines)}).encode(),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github.v3+json"
                  }
              )
              with urllib.request.urlopen(req) as r:
                  print(f"Fallback comment posted ({len(fallback)} items): {r.status}")

          with open("posting_stats.json", "w") as f:
              json.dump({"inline": posted, "fallback": len(fallback)}, f)

          print(f"\nSummary: {posted} inline, {len(fallback)} fallback \u2014 0 lost")
          EOF

      # Step 10: Add ai-reviewed label
      - name: Add ai-reviewed label
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/labels" \
            -d '{"name":"ai-reviewed","color":"7057ff","description":"AI code review completed"}' || true
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
            -d '{"labels":["ai-reviewed"]}'
          echo "Label ai-reviewed applied"

      # Step 11: Post final summary with test results breakdown
      - name: Post summary comment
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TOTAL_LINES: ${{ steps.validate_diff.outputs.total_lines }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request

          with open("posting_stats.json") as f:
              stats = json.load(f)
          with open("diff_chunks.json") as f:
              chunks = json.load(f)
          with open("line_comments.json") as f:
              comments = json.load(f)
          with open("test_results.json") as f:
              test_results = json.load(f)

          inline   = stats["inline"]
          fallback = stats["fallback"]
          total    = inline + fallback

          # Per-file comment counts
          file_summary = {}
          for c in comments:
              file_summary[c["file"]] = file_summary.get(c["file"], 0) + 1
          files_reviewed = len({c["file"] for c in chunks})

          file_rows = ""
          for filepath, count in sorted(file_summary.items()):
              file_rows += f"| `{filepath}` | {count} |\n"
          if not file_rows:
              file_rows = "| \u2014 | 0 |\n"

          # Test results summary
          confirmed   = [t for t in test_results if t["status"] == "CONFIRMED"]
          unconfirmed = [t for t in test_results if t["status"] == "UNCONFIRMED"]

          test_section = ""
          if test_results:
              test_section = "\n**\U0001f9ea AI-Generated Test Results:**\n\n"
              test_section += "| Function | File | Tests | Result |\n|---|---|---|---|\n"
              for t in test_results:
                  result_icon = "\U0001f534 Bug Confirmed" if t["status"] == "CONFIRMED" else "\u2705 Unconfirmed"
                  test_section += f"| `{t['function_name']}()` | `{t['file']}` | {t['passed']}P / {t['failed']}F | {result_icon} |\n"

              if confirmed:
                  test_section += f"\n> \U0001f534 **{len(confirmed)} finding(s) confirmed** by failing tests — these are real bugs, fix them before merge.\n"
              if unconfirmed:
                  test_section += f"> \u2705 **{len(unconfirmed)} finding(s) unconfirmed** — tests passed, review manually.\n"

          fallback_note = (
              f"\n> \U0001f4dd **{fallback} finding(s)** outside diff view \u2014 see Additional Findings comment above."
              if fallback > 0 else ""
          )

          body = (
              "\U0001f916 **AI Code Review Complete**\n\n"
              "| | |\n|---|---|\n"
              f"| Files reviewed | {files_reviewed} |\n"
              f"| Lines reviewed | {os.environ.get('TOTAL_LINES', '?')} |\n"
              f"| Inline comments | {inline} |\n"
              f"| Fallback comments | {fallback} |\n"
              f"| Total findings | {total} |\n"
              f"| Tests generated | {len(test_results)} |\n"
              f"| Bugs confirmed | {len(confirmed)} |\n"
              "| Label | `ai-reviewed` |\n"
              "\n**Findings by file:**\n\n"
              "| File | Comments |\n|---|---|\n"
              + file_rows
              + test_section
              + fallback_note
              + "\n\n\u26a0\ufe0f **AI review is a one-time pass. Fix confirmed bugs first, "
              "then address other comments, then request peer review. AI will not review this PR again.**"
          )

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
              data=json.dumps({"body": body}).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              print(f"Summary posted: {r.status}")
          EOF
