name: AI Code Review (Final)

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CHUNK_SIZE: 200
  MAX_TOTAL_LINES: 1000
  CONTEXT_LINES: 5        # Lines to read before & after from actual file

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout full repo on runner machine
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Check if AI already reviewed this PR
      - name: Check if AI already reviewed this PR
        id: check_reviewed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import os
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments?per_page=100",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github.v3+json"
              }
          )
          with urllib.request.urlopen(req) as response:
              comments = json.loads(response.read())
          already_reviewed = any(
              "AI Code Review Complete" in c.get("body", "") or
              "AI Code Review Skipped" in c.get("body", "")
              for c in comments
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_reviewed={'true' if already_reviewed else 'false'}\n")
          print(f"Already reviewed: {already_reviewed}")
          EOF

      # Step 3: Stop if already reviewed
      - name: Post already reviewed comment and stop
        if: steps.check_reviewed.outputs.already_reviewed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{
              \"body\": \"## ℹ️ AI Review Already Done\n\n✅ AI has already reviewed this PR once. No further AI reviews will run.\n\n**Next step:** Please fix the AI comments and request a **peer review** from your teammates.\"
            }"

      # Step 4: Get diff — only source files, count only added lines
      - name: Get PR diff and validate size
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        id: validate_diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.js' '*.ts' '*.tsx' '*.jsx' \
               '*.java' '*.go' '*.rb' '*.php' '*.cs' \
               '*.cpp' '*.c' '*.h' '*.rs' '*.swift' \
               '*.kt' '*.scala' '*.yaml' '*.yml' '*.json' \
               '*.html' '*.css' '*.scss' \
            > pr_diff.txt
          ADDED_LINES=$(grep -c '^+[^+]' pr_diff.txt || true)
          echo "Added lines in diff: $ADDED_LINES"
          echo "total_lines=$ADDED_LINES" >> $GITHUB_OUTPUT
          if [ "$ADDED_LINES" -gt "$MAX_TOTAL_LINES" ]; then
            echo "too_large=true" >> $GITHUB_OUTPUT
          else
            echo "too_large=false" >> $GITHUB_OUTPUT
          fi

      # Step 5: Hard stop if exceeds MAX_TOTAL_LINES
      - name: Comment PR too large and exit
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{
              \"body\": \"## ⚠️ AI Code Review Skipped\n\n**Reason:** This PR has **${{ steps.validate_diff.outputs.total_lines }} added lines** which exceeds the maximum limit of 1000 lines.\n\n**Please split this PR into smaller focused PRs.**\"
            }"
          exit 0

      # Step 6: Parse diff to get changed line numbers
      #         Then read actual context from cloned repo files
      - name: Parse diff and enrich with real file context
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          CONTEXT_LINES: ${{ env.CONTEXT_LINES }}
        run: |
          python3 << 'EOF'
          import json
          import re
          import os
          context_size = int(os.environ.get("CONTEXT_LINES", 5))
          changed_lines = []
          current_file = None
          new_line = 0
          with open("pr_diff.txt", "r") as f:
              raw_lines = f.readlines()
          # Pass 1 — extract only added lines with file + line number from diff
          for line in raw_lines:
              if line.startswith("diff --git"):
                  match = re.search(r'b/(.+)', line)
                  if match:
                      current_file = match.group(1).strip()
              elif line.startswith("@@"):
                  match = re.search(r'\+(\d+)', line)
                  if match:
                      new_line = int(match.group(1)) - 1
              elif line.startswith("+") and not line.startswith("+++"):
                  new_line += 1
                  changed_lines.append({
                      "file": current_file,
                      "line": new_line,
                      "content": line[1:].rstrip()
                  })
              elif not line.startswith("-") and not line.startswith("\\"):
                  new_line += 1
          # Pass 2 — for each changed line, read real context from cloned repo
          diff_data = []
          for entry in changed_lines:
              file_path = entry["file"]
              changed_line_num = entry["line"]
              context_before = []
              context_after = []
              if os.path.exists(file_path):
                  with open(file_path, "r", errors="ignore") as f:
                      all_file_lines = f.readlines()
                  total_file_lines = len(all_file_lines)
                  start = max(0, changed_line_num - context_size - 1)
                  end = changed_line_num - 1
                  context_before = [
                      f"line {start + i + 1}: {all_file_lines[start + i].rstrip()}"
                      for i in range(end - start)
                  ]
                  start_after = changed_line_num
                  end_after = min(total_file_lines, changed_line_num + context_size)
                  context_after = [
                      f"line {start_after + i + 1}: {all_file_lines[start_after + i].rstrip()}"
                      for i in range(end_after - start_after)
                  ]
              diff_data.append({
                  "file": file_path,
                  "line": changed_line_num,
                  "content": entry["content"],
                  "context_before": context_before,
                  "context_after": context_after
              })
          # Split into chunks of CHUNK_SIZE for OpenAI
          chunk_size = int(os.environ.get("CHUNK_SIZE", 200))
          chunks = [diff_data[i:i+chunk_size] for i in range(0, len(diff_data), chunk_size)]
          with open("diff_chunks.json", "w") as f:
              json.dump(chunks, f, indent=2)
          print(f"Total changed lines: {len(diff_data)}")
          print(f"Split into {len(chunks)} chunk(s) of {chunk_size} lines each")
          EOF

      # Step 7: Call OpenAI per chunk with real context, merge all comments
      - name: Call OpenAI per chunk and collect comments
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          import urllib.error
          import os
          import time

          with open("diff_chunks.json", "r") as f:
              chunks = json.load(f)

          api_key = os.environ["OPENAI_API_KEY"]
          all_comments = []

          for idx, chunk in enumerate(chunks):
              print(f"\nProcessing chunk {idx+1}/{len(chunks)} ({len(chunk)} lines)...")

              # Build prompt input — each entry labelled with EXACT file path and line number
              diff_text = ""
              for item in chunk:
                  diff_text += "\n---\n"
                  # FILE_PATH is written alone on its own token so the model copies it cleanly
                  diff_text += f"FILE_PATH: {item['file']}\n"
                  diff_text += f"LINE: {item['line']}\n"
                  if item["context_before"]:
                      diff_text += "Context before:\n"
                      for c in item["context_before"]:
                          diff_text += f"  {c}\n"
                  diff_text += f">>> ADDED LINE {item['line']}: {item['content']}\n"
                  if item["context_after"]:
                      diff_text += "Context after:\n"
                      for c in item["context_after"]:
                          diff_text += f"  {c}\n"

              # ---------------------------------------------------------------
              # SYSTEM PROMPT
              # ---------------------------------------------------------------
              system_prompt = (
                  "You are a senior software engineer performing a focused, high-signal code review. "
                  "You respond ONLY with a valid JSON array. "
                  "No markdown fences, no explanation, no preamble. "
                  "If there are no issues return exactly: []"
              )

              # ---------------------------------------------------------------
              # USER PROMPT
              # ---------------------------------------------------------------
              user_prompt = (
                  "Review the newly added lines from a pull request below.\n"
                  "Each block shows:\n"
                  "  FILE_PATH — the exact file path you MUST copy into your JSON output\n"
                  "  LINE      — the exact line number you MUST copy into your JSON output\n"
                  "  Context before/after — surrounding lines from the real file (for understanding only)\n"
                  "  >>> ADDED LINE — the line you must review\n"
                  "\n"
                  "FLAG the ADDED LINE only if it has a genuine, objective issue:\n"
                  "  - Security vulnerabilities (injection, exposed secrets, broken auth)\n"
                  "  - Bugs that will cause crashes, data loss, or wrong results\n"
                  "  - Missing error handling on I/O, network, or DB calls that will silently fail\n"
                  "  - Race conditions or concurrency bugs\n"
                  "  - Obvious performance issues (N+1 queries, unbounded loops on large data)\n"
                  "  - Resource leaks (unclosed files, connections, handles)\n"
                  "  - Hardcoded secrets, credentials, or magic values that must be config\n"
                  "\n"
                  "DO NOT FLAG:\n"
                  "  - Style, naming, or formatting preferences\n"
                  "  - Architectural opinions\n"
                  "  - Anything already handled in the surrounding context lines\n"
                  "  - Test files unless there is a definite logic bug\n"
                  "\n"
                  "BEFORE outputting, think through:\n"
                  "  1. Read the full context to understand what the code does\n"
                  "  2. Focus only on the >>> ADDED LINE\n"
                  "  3. Will this line cause a real problem in production?\n"
                  "  4. Is the fix specific and actionable?\n"
                  "\n"
                  "OUTPUT — a JSON array where each object has exactly:\n"
                  '  "file"    : copy the FILE_PATH value exactly, character-for-character\n'
                  '  "line"    : copy the LINE value exactly as an integer\n'
                  '  "comment" : one concise sentence — state the problem and what to fix\n'
                  "\n"
                  "Example:\n"
                  "[\n"
                  "  {\n"
                  '    "file": "src/lib/gemini.ts",\n'
                  '    "line": 34,\n'
                  '    "comment": "API key is read without a null check — add a startup guard and throw a descriptive error if the variable is missing."\n'
                  "  }\n"
                  "]\n"
                  "\n"
                  "If no genuine issues, return exactly: []\n"
                  "\n"
                  "LINES TO REVIEW:\n"
                  + diff_text
              )

              payload = {
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user",   "content": user_prompt}
                  ],
                  "max_tokens": 1500,
                  "temperature": 0.1
              }

              for attempt in range(3):
                  try:
                      req = urllib.request.Request(
                          "https://api.openai.com/v1/chat/completions",
                          data=json.dumps(payload).encode(),
                          headers={
                              "Content-Type": "application/json",
                              "Authorization": f"Bearer {api_key}"
                          }
                      )
                      with urllib.request.urlopen(req) as response:
                          data = json.loads(response.read())

                      raw = data["choices"][0]["message"]["content"].strip()
                      if raw.startswith("```"):
                          raw = "\n".join(raw.split("\n")[1:])
                      if raw.endswith("```"):
                          raw = "\n".join(raw.split("\n")[:-1])
                      raw = raw.strip()

                      chunk_comments = json.loads(raw)
                      all_comments.extend(chunk_comments)
                      print(f"Chunk {idx+1}: {len(chunk_comments)} comments generated")
                      break

                  except Exception as e:
                      print(f"Chunk {idx+1} attempt {attempt+1} failed: {e}")
                      if attempt < 2:
                          wait = 2 ** attempt
                          print(f"Retrying in {wait}s...")
                          time.sleep(wait)
                      else:
                          print(f"Chunk {idx+1} failed after 3 attempts, skipping")

              if idx < len(chunks) - 1:
                  time.sleep(2)

          with open("line_comments.json", "w") as f:
              json.dump(all_comments, f, indent=2)
          print(f"\nTotal comments from all chunks: {len(all_comments)}")
          EOF

      # Step 8: Post inline line-level comments on PR
      - name: Post line-level comments on PR
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          PR_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 << 'EOF'
          import json
          import urllib.request
          import urllib.error
          import os

          with open("line_comments.json", "r") as f:
              comments = json.load(f)

          with open("diff_chunks.json", "r") as f:
              chunks = json.load(f)

          # Build authoritative path lookup from the parsed diff — these paths are always correct
          # Keys: full path, basename, and any b/-prefixed variant all map to the clean full path
          path_lookup = {}
          for chunk in chunks:
              for item in chunk:
                  full_path = item["file"]
                  if full_path.startswith("b/"):
                      full_path = full_path[2:]
                  path_lookup[full_path] = full_path
                  # Strip leading directories progressively so partial paths also resolve
                  parts = full_path.split("/")
                  for i in range(len(parts)):
                      suffix = "/".join(parts[i:])
                      if suffix not in path_lookup:
                          path_lookup[suffix] = full_path

          def resolve_path(raw):
              """
              Clean up whatever the AI returned and map it to the real file path.
              Handles: 'src/lib/gemini.ts', 'gemini.ts', 'b/src/lib/gemini.ts',
                       'gemini.ts b/src/lib/gemini.ts' (AI copied whole label line)
              """
              raw = raw.strip()

              # Case: AI copied the whole label e.g. "gemini.ts b/src/lib/gemini.ts"
              # Take the last token which is the most specific path
              if " " in raw:
                  raw = raw.split()[-1]

              # Strip b/ prefix
              if raw.startswith("b/"):
                  raw = raw[2:]

              # Exact match
              if raw in path_lookup:
                  return path_lookup[raw]

              # Suffix match (e.g. bare filename or partial path)
              parts = raw.split("/")
              for i in range(len(parts)):
                  suffix = "/".join(parts[i:])
                  if suffix in path_lookup:
                      return path_lookup[suffix]

              # No match — return as-is and let GitHub give the 422
              print(f"  WARNING: could not resolve path '{raw}' — posting as-is")
              return raw

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          commit_sha = os.environ["PR_COMMIT_SHA"]

          posted = 0
          failed = 0

          for item in comments:
              resolved_path = resolve_path(item["file"])
              payload = {
                  "body": f"🤖 **AI Review:** {item['comment']}",
                  "commit_id": commit_sha,
                  "path": resolved_path,
                  "line": item["line"],
                  "side": "RIGHT"
              }
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/pulls/{pr_number}/comments",
                  data=json.dumps(payload).encode(),
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "Accept": "application/vnd.github.v3+json"
                  }
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      if response.status == 201:
                          posted += 1
                          print(f"Posted on {resolved_path} line {item['line']}")
              except urllib.error.HTTPError as e:
                  failed += 1
                  print(f"Failed on {resolved_path} line {item['line']}: {e.read().decode()}")

          print(f"\nSummary: {posted} posted, {failed} failed")
          EOF

      # Step 9: Add ai-reviewed label
      - name: Add ai-reviewed label
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/labels" \
            -d '{"name":"ai-reviewed","color":"7057ff","description":"AI code review completed"}' || true
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/labels" \
            -d '{"labels":["ai-reviewed"]}'
          echo "Label ai-reviewed applied"

      # Step 10: Post final summary comment
      - name: Post summary comment
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TOTAL_LINES: ${{ steps.validate_diff.outputs.total_lines }}
        run: |
          python3 << 'EOF'
          import json, os, urllib.request

          with open("line_comments.json") as f:
              comments = json.load(f)
          with open("diff_chunks.json") as f:
              chunks = json.load(f)

          total_lines = os.environ.get("TOTAL_LINES", "?")
          chunk_count = len(chunks)
          total = len(comments)

          body = (
              "## \u2705 AI Code Review Complete\n\n"
              f"- **Total added lines reviewed:** {total_lines}\n"
              f"- **Chunks processed:** {chunk_count}\n"
              f"- **Inline comments posted:** {total}\n"
              "- **Label added:** `ai-reviewed`\n\n"
              "\u26a0\ufe0f **AI review is a one-time pass. Please fix the inline comments above, "
              "then request a peer review from your teammates. AI will not review this PR again.**"
          )

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          payload = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments",
              data=payload,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
                  "Accept": "application/vnd.github.v3+json"
              }
          )
          with urllib.request.urlopen(req) as r:
              print(f"Summary posted: {r.status}")
          EOF
