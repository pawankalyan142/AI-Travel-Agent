name: AI Code Review (Final)

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  MAX_TOTAL_LINES: 1000
  MAX_LINES_PER_FILE: 300
  CONTEXT_LINES: 10

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout full repo
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Check if AI already reviewed this PR
      - name: Check if AI already reviewed this PR
        id: check_reviewed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr_number}/comments?per_page=100",
              headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req) as r:
              comments = json.loads(r.read())
          already_reviewed = any(
              "AI Code Review Complete" in c.get("body", "") or
              "AI Code Review Skipped" in c.get("body", "")
              for c in comments
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_reviewed={'true' if already_reviewed else 'false'}\n")
          print(f"Already reviewed: {already_reviewed}")
          EOF

      # Step 3: Stop if already reviewed — apply label
      - name: Post already reviewed comment and stop
        if: steps.check_reviewed.outputs.already_reviewed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": \"## ℹ️ AI Review Already Done\n\n✅ AI has already reviewed this PR once. No further AI reviews will run.\n\n**Next step:** Please fix the AI comments and request a **peer review** from your teammates.\"}"

      # Step 4: Get diff and validate size
      - name: Get PR diff and validate size
        if: steps.check_reviewed.outputs.already_reviewed == 'false'
        id: validate_diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.js' '*.ts' '*.tsx' '*.jsx' \
               '*.java' '*.go' '*.rb' '*.php' '*.cs' \
               '*.cpp' '*.c' '*.h' '*.rs' '*.swift' \
               '*.kt' '*.scala' '*.yaml' '*.yml' '*.json' \
               '*.html' '*.css' '*.scss' \
            > pr_diff.txt
          ADDED_LINES=$(grep -c '^+[^+]' pr_diff.txt || true)
          echo "Added lines in diff: $ADDED_LINES"
          echo "total_lines=$ADDED_LINES" >> $GITHUB_OUTPUT
          if [ "$ADDED_LINES" -gt "$MAX_TOTAL_LINES" ]; then
            echo "too_large=true" >> $GITHUB_OUTPUT
          else
            echo "too_large=false" >> $GITHUB_OUTPUT
          fi

      # Step 5: Hard stop if PR too large — apply label
      - name: Comment PR too large and label
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Post comment
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "{\"body\": \"## ⚠️ AI Code Review Skipped\n\n**Reason:** This PR has **${{ steps.validate_diff.outputs.total_lines }} added lines** which exceeds the limit of 1000 lines.\n\n**Please split this PR into smaller focused PRs.**\"}"

          # Apply label: ai:skipped-too-large
          python3 << 'LABEL_EOF'
          import urllib.request, json, os
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr = os.environ["PR_NUMBER"]

          def ensure_label(name, color, description):
              """Create label if it doesn't exist"""
              try:
                  data = json.dumps({"name": name, "color": color, "description": description}).encode()
                  req = urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/labels",
                      data=data,
                      headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
                  )
                  urllib.request.urlopen(req)
              except Exception:
                  pass  # label already exists

          def apply_label(name):
              data = json.dumps({"labels": [name]}).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{pr}/labels",
                  data=data,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)

          ensure_label("ai:skipped-too-large", "FFC107", "PR too large for AI review")
          apply_label("ai:skipped-too-large")
          print("Label applied: ai:skipped-too-large")
          LABEL_EOF

          exit 0

      # Step 6: Prepare per-file diffs like a senior engineer sees them
      # Strategy: Send the full unified diff per file (same view as GitHub PR tab)
      # For files under 500 lines, also send the complete file so AI has full context
      - name: Prepare per-file review packages
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, re, os

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr_number = os.environ["PR_NUMBER"]

          LANG_MAP = {
              "js": "JavaScript", "ts": "TypeScript", "tsx": "TypeScript/React",
              "jsx": "JavaScript/React", "py": "Python", "java": "Java",
              "go": "Go", "rb": "Ruby", "php": "PHP", "cs": "C#",
              "cpp": "C++", "c": "C", "h": "C/C++ Header", "rs": "Rust",
              "swift": "Swift", "kt": "Kotlin", "scala": "Scala",
              "yaml": "YAML", "yml": "YAML", "json": "JSON",
              "html": "HTML", "css": "CSS", "scss": "SCSS"
          }

          # --- PART A: Get valid commentable lines from GitHub API ---
          valid = set()
          page = 1
          while True:
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/pulls/{pr_number}/files?per_page=100&page={page}",
                  headers={"Authorization": f"Bearer {token}", "Accept": "application/vnd.github.v3+json"}
              )
              with urllib.request.urlopen(req) as r:
                  files = json.loads(r.read())
              if not files:
                  break
              for f in files:
                  patch = f.get("patch", "")
                  if not patch:
                      continue
                  current_line = 0
                  for patch_line in patch.split("\n"):
                      if patch_line.startswith("@@"):
                          m = re.search(r'\+(\d+)', patch_line)
                          if m:
                              current_line = int(m.group(1)) - 1
                      elif patch_line.startswith("+"):
                          current_line += 1
                          valid.add((f["filename"], current_line))
                      elif not patch_line.startswith("-"):
                          current_line += 1
              page += 1

          with open("valid_lines.json", "w") as out:
              json.dump([{"file": f, "line": l} for f, l in valid], out)
          print(f"Valid commentable lines: {len(valid)}")

          # --- PART B: Split pr_diff.txt into per-file unified diffs ---
          with open("pr_diff.txt", "r") as f:
              full_diff = f.read()

          file_diffs = {}
          current_file = None
          current_lines = []

          for line in full_diff.split("\n"):
              if line.startswith("diff --git"):
                  if current_file and current_lines:
                      file_diffs[current_file] = "\n".join(current_lines)
                  parts = line.split(" b/")
                  current_file = parts[-1].strip() if len(parts) >= 2 else None
                  current_lines = [line]
              else:
                  current_lines.append(line)

          if current_file and current_lines:
              file_diffs[current_file] = "\n".join(current_lines)

          # --- PART C: Build review packages per file ---
          review_packages = []

          for filepath, diff_content in file_diffs.items():
              ext = filepath.rsplit(".", 1)[-1].lower() if "." in filepath else ""
              language = LANG_MAP.get(ext, "Unknown")

              # Count added lines in this file's diff
              added_count = sum(1 for l in diff_content.split("\n")
                              if l.startswith("+") and not l.startswith("+++"))

              # Read full file if it exists and is under 500 lines
              full_file_content = ""
              total_lines = 0
              if os.path.exists(filepath):
                  with open(filepath, "r", errors="ignore") as f:
                      file_lines = f.readlines()
                  total_lines = len(file_lines)
                  if total_lines <= 500:
                      numbered = []
                      for i, line in enumerate(file_lines, 1):
                          numbered.append(f"{i:4d} | {line.rstrip()}")
                      full_file_content = "\n".join(numbered)

              # Get valid line numbers for this file
              file_valid_lines = sorted([l for f, l in valid if f == filepath])

              review_packages.append({
                  "file": filepath,
                  "language": language,
                  "total_lines": total_lines,
                  "added_lines": added_count,
                  "diff": diff_content,
                  "full_file": full_file_content,
                  "valid_lines": file_valid_lines
              })

          with open("review_packages.json", "w") as out:
              json.dump(review_packages, out, indent=2)

          print(f"Files: {len(review_packages)}")
          for pkg in review_packages:
              ctx = "with full file" if pkg["full_file"] else "diff only"
              print(f"  {pkg['file']}: {pkg['added_lines']} added, {pkg['total_lines']} total ({ctx})")
          EOF

      # Step 7: AI reviews each file like a senior engineer
      # Sends: full unified diff + complete file content (for files < 500 lines)
      # The AI sees exactly what you see in the GitHub PR "Files changed" tab
      - name: AI code review per file
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os, time

          with open("review_packages.json", "r") as f:
              packages = json.load(f)

          api_key = os.environ["OPENAI_API_KEY"]
          all_comments = []

          for idx, pkg in enumerate(packages):
              filepath = pkg["file"]
              language = pkg["language"]
              total_lines = pkg["total_lines"]
              added_lines = pkg["added_lines"]
              diff = pkg["diff"]
              full_file = pkg["full_file"]
              valid_lines = pkg["valid_lines"]

              print(f"\nReviewing: {filepath} ({added_lines} added in {total_lines}-line {language} file)")

              # --- Build the prompt exactly like a senior engineer reviews ---
              system_prompt = (
                  "You are a senior software engineer with 10+ years of experience. "
                  "You are reviewing a pull request on GitHub. "
                  "You will receive the unified diff for one file and optionally the full file content. "
                  "Review the CHANGES (lines starting with +) in the context of the full file. "
                  "Think like a human reviewer: understand the intent, then find real problems. "
                  "Respond ONLY with a valid JSON array. No markdown, no explanation. "
                  "If no issues: []"
              )

              # Build context section
              context_section = f"## FILE: {filepath}\n"
              context_section += f"Language: {language} | Total lines: {total_lines} | Lines added: {added_lines}\n\n"

              if full_file:
                  context_section += "## COMPLETE FILE (with line numbers):\n"
                  context_section += "```\n" + full_file + "\n```\n\n"

              context_section += "## UNIFIED DIFF (this is what changed in this PR):\n"
              context_section += "```diff\n" + diff + "\n```\n"

              user_prompt = (
                  context_section + "\n"
                  "## YOUR TASK\n"
                  "Review the added lines (starting with +) in the diff above.\n"
                  "You have the full file for context — use it to understand how changes fit.\n\n"
                  "FLAG these — they are real problems a senior engineer would block a PR for:\n"
                  "  1. SECURITY: Hardcoded secrets, credentials, API keys, connection strings in code\n"
                  "  2. SECURITY: SQL/NoSQL injection, XSS, command injection, path traversal\n"
                  "  3. SECURITY: Missing authentication/authorization checks\n"
                  "  4. BUGS: Null/undefined access that WILL crash at runtime\n"
                  "  5. BUGS: Off-by-one errors, wrong logic operators, unreachable code\n"
                  "  6. BUGS: Unhandled promise rejections, missing try-catch on I/O/network/DB\n"
                  "  7. BUGS: Race conditions, shared mutable state without locks\n"
                  "  8. PERFORMANCE: N+1 queries, unbounded loops, missing pagination\n"
                  "  9. RESOURCES: Unclosed connections, file handles, event listeners not cleaned up\n"
                  " 10. DATA: Missing input validation that could corrupt data or crash\n\n"
                  "DO NOT FLAG:\n"
                  "  - Style, naming, formatting, spacing\n"
                  "  - Architectural opinions or preferences\n"
                  "  - Missing types in JavaScript (unless it causes a real bug)\n"
                  "  - Test files (unless there is a definite bug IN the test)\n"
                  "  - Things that are safe in context (check the full file!)\n"
                  "  - Console.log statements\n\n"
                  "IMPORTANT RULES:\n"
                  "  - Only comment on ADDED lines (+ lines in the diff)\n"
                  f"  - Valid line numbers you can comment on: {valid_lines}\n"
                  "  - If a pattern repeats, flag the FIRST occurrence and say it applies elsewhere\n"
                  "  - Each comment must state the EXACT problem and the EXACT fix\n"
                  "  - Be specific: say 'adminPassword on line 4 is a hardcoded secret' not 'consider using env vars'\n\n"
                  "OUTPUT — JSON array, each object:\n"
                  '  "line": integer — must be from the valid line numbers list above\n'
                  '  "severity": "critical" | "warning"\n'
                  '  "category": "security" | "bug" | "error-handling" | "performance" | "resource-leak" | "data-validation"\n'
                  '  "comment": one clear sentence — what is wrong and how to fix it\n'
                  '  "testable": true if provable with a unit test (pure logic, no DB/network), false otherwise\n'
                  '  "function_name": function/method containing this line, or "" if top-level\n\n'
                  'Example:\n'
                  '[{"line": 4, "severity": "critical", "category": "security", '
                  '"comment": "adminPassword is hardcoded — move to environment variable using process.env.ADMIN_PASSWORD", '
                  '"testable": false, "function_name": ""}]\n\n'
                  "If no real issues: []\n"
              )

              payload = {
                  "model": "gpt-4o",
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user",   "content": user_prompt}
                  ],
                  "max_tokens": 3000,
                  "temperature": 0.1
              }

              # Retry with exponential backoff — longer waits for rate limits
              for attempt in range(4):
                  try:
                      req = urllib.request.Request(
                          "https://api.openai.com/v1/chat/completions",
                          data=json.dumps(payload).encode(),
                          headers={"Content-Type": "application/json", "Authorization": f"Bearer {api_key}"}
                      )
                      with urllib.request.urlopen(req) as response:
                          data = json.loads(response.read())

                      raw = data["choices"][0]["message"]["content"].strip()
                      if raw.startswith("```"):
                          raw = "\n".join(raw.split("\n")[1:])
                      if raw.endswith("```"):
                          raw = "\n".join(raw.split("\n")[:-1])
                      raw = raw.strip()

                      file_comments = json.loads(raw)

                      # Validate: only keep comments on valid lines
                      valid_set = set(valid_lines)
                      resolved = []
                      for c in file_comments:
                          line_num = int(c["line"])
                          if line_num in valid_set:
                              resolved.append({
                                  "file":          filepath,
                                  "line":          line_num,
                                  "severity":      c.get("severity", "warning"),
                                  "category":      c.get("category", "bug"),
                                  "comment":       c["comment"],
                                  "testable":      c.get("testable", False),
                                  "function_name": c.get("function_name", "")
                              })
                          else:
                              print(f"  Skipped invalid line {line_num} (not in PR diff)")

                      all_comments.extend(resolved)
                      critical = sum(1 for r in resolved if r["severity"] == "critical")
                      warning = sum(1 for r in resolved if r["severity"] == "warning")
                      print(f"  -> {len(resolved)} comments ({critical} critical, {warning} warning)")
                      break

                  except Exception as e:
                      err_str = str(e)
                      print(f"  Attempt {attempt+1} failed: {err_str}")
                      if "429" in err_str:
                          # Rate limit — wait longer: 15s, 30s, 60s, then give up
                          wait = [15, 30, 60, 0][attempt]
                          if wait > 0:
                              print(f"  Rate limited. Waiting {wait}s before retry...")
                              time.sleep(wait)
                          else:
                              print(f"  Skipping {filepath} after 4 rate-limit retries")
                      elif attempt < 3:
                          wait = 2 ** attempt
                          print(f"  Retrying in {wait}s...")
                          time.sleep(wait)
                      else:
                          print(f"  Skipping {filepath} after 4 attempts")

              # Small delay between files to avoid rate limits
              if idx < len(packages) - 1:
                  time.sleep(3)

          with open("line_comments.json", "w") as f:
              json.dump(all_comments, f, indent=2)

          # Also save packages info for summary step
          with open("diff_chunks.json", "w") as f:
              json.dump([{"file": p["file"], "lines": [{"line": l} for l in range(p["added_lines"])]}
                        for p in packages], f)

          print(f"\nTotal comments: {len(all_comments)}")
          crit = sum(1 for c in all_comments if c["severity"] == "critical")
          warn = sum(1 for c in all_comments if c["severity"] == "warning")
          print(f"  Critical: {crit}, Warning: {warn}")
          EOF

      # Step 8: Apply PR labels based on review results
      - name: Apply PR labels based on review results
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr = os.environ["PR_NUMBER"]

          with open("line_comments.json", "r") as f:
              comments = json.load(f)

          def ensure_label(name, color, description):
              try:
                  data = json.dumps({"name": name, "color": color, "description": description}).encode()
                  req = urllib.request.Request(
                      f"https://api.github.com/repos/{repo}/labels",
                      data=data,
                      headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
                  )
                  urllib.request.urlopen(req)
                  print(f"Created label: {name}")
              except Exception:
                  pass  # already exists

          def apply_label(name):
              data = json.dumps({"labels": [name]}).encode()
              req = urllib.request.Request(
                  f"https://api.github.com/repos/{repo}/issues/{pr}/labels",
                  data=data,
                  headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"}
              )
              urllib.request.urlopen(req)
              print(f"Applied label: {name}")

          # Ensure all AI labels exist
          ensure_label("ai:clean",            "0E8A16", "AI review found no issues")
          ensure_label("ai:issues-found",     "D93F0B", "AI review found issues to fix")
          ensure_label("ai:has-testable-bugs","B60205", "AI found bugs confirmable by auto-tests")

          total = len(comments)
          testable = sum(1 for c in comments if c.get("testable", False))

          if total == 0:
              apply_label("ai:clean")
              print("No issues found — PR is clean")
          else:
              apply_label("ai:issues-found")
              if testable > 0:
                  apply_label("ai:has-testable-bugs")
              print(f"Issues found: {total} total, {testable} testable")
          EOF

      # Step 9: Post review summary as PR comment (no commits, no branches)
      - name: Post AI review summary comment
        if: steps.check_reviewed.outputs.already_reviewed == 'false' && steps.validate_diff.outputs.too_large == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, urllib.request, os

          with open("line_comments.json", "r") as f:
              comments = json.load(f)

          with open("review_packages.json", "r") as f:
              packages = json.load(f)

          total_issues = len(comments)
          testable = sum(1 for c in comments if c.get("testable", False))
          critical = sum(1 for c in comments if c.get("severity") == "critical")
          warning = sum(1 for c in comments if c.get("severity") == "warning")
          non_testable = total_issues - testable
          files_reviewed = len(packages)
          total_lines = sum(p["added_lines"] for p in packages)
          files_with_issues = len(set(c["file"] for c in comments)) if comments else 0
          clean_files = files_reviewed - files_with_issues

          # Build the summary comment
          if total_issues == 0:
              status_icon = "✅"
              status_text = "No issues found — code looks clean!"
              verdict = "CLEAN"
          elif critical > 0:
              status_icon = "🔴"
              status_text = f"Found **{critical} critical** and **{warning} warning** issue(s) — immediate fixes needed"
              verdict = "CRITICAL ISSUES"
          else:
              status_icon = "🟡"
              status_text = f"Found **{total_issues} warning(s)** to review"
              verdict = "WARNINGS"

          # Build file breakdown
          file_breakdown = ""
          files_grouped = {}
          for c in comments:
              f = c["file"]
              if f not in files_grouped:
                  files_grouped[f] = []
              files_grouped[f].append(c)

          if files_grouped:
              file_breakdown = "\n### 📂 Issues by File\n\n"
              file_breakdown += "| File | Issues | Testable |\n"
              file_breakdown += "|------|--------|----------|\n"
              for f, file_comments in files_grouped.items():
                  t = sum(1 for c in file_comments if c.get("testable", False))
                  file_breakdown += f"| `{f}` | {len(file_comments)} | {t} |\n"

          # Build detailed findings
          findings = ""
          if comments:
              findings = "\n### 🔍 Findings Detail\n\n"
              for i, c in enumerate(comments, 1):
                  sev = "🔴 Critical" if c.get("severity") == "critical" else "🟡 Warning"
                  cat = c.get("category", "bug")
                  test_tag = " | 🧪 Testable" if c.get("testable", False) else ""
                  func = f" in `{c['function_name']}()`" if c.get("function_name") else ""
                  findings += f"**{i}.** `{c['file']}` line {c['line']}{func}\n"
                  findings += f"   {sev} | `{cat}`{test_tag}\n"
                  findings += f"   > {c['comment']}\n\n"

          body = (
              f"## {status_icon} AI Code Review Complete — {verdict}\n\n"
              f"{status_text}\n\n"
              f"### 📊 Review Summary\n\n"
              f"| Metric | Value |\n"
              f"|--------|-------|\n"
              f"| Files reviewed | {files_reviewed} |\n"
              f"| Lines analyzed | {total_lines} |\n"
              f"| Total issues | {total_issues} |\n"
              f"| Critical | {critical} |\n"
              f"| Warning | {warning} |\n"
              f"| Testable bugs | {testable} |\n"
              f"| Clean files | {clean_files}/{files_reviewed} |\n"
              f"{file_breakdown}{findings}\n"
              f"---\n"
              f"<sub>🤖 AI Code Review Complete — powered by GPT-4o | Review covers added lines only</sub>\n"
          )

          # Post the comment
          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["REPO"]
          pr = os.environ["PR_NUMBER"]

          data = json.dumps({"body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues/{pr}/comments",
              data=data,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json"
              }
          )
          urllib.request.urlopen(req)
          print(f"Summary posted: {total_issues} issues, {testable} testable, {files_reviewed} files")
          EOF
